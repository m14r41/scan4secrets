# =================== Generic catch-alls (last resort) ===================

- id: generic-high-entropy-quoted
  description: Quoted high-entropy value next to credential-sounding name
  severity: low
  keywords: ["secret", "token", "password", "api_key", "apikey", "auth", "passwd"]
  regex: "(?i)(?:secret|token|password|api[_\\-]?key|auth|passwd)[_\\-\\.\\s]*[:=]\\s*[\"']([A-Za-z0-9/+=_\\-]{20,})[\"']"
  entropy_min: 4.0
  allowlist:
    regex:
      - 'xxxxxxxx'
      - '<[^>]*>'
      - '\{\{[^}]*\}\}'
      - 'changeme'
      - 'example'
      - 'placeholder'
      - 'your[_\-]?(?:api[_\-]?key|token|secret|password)'
      - '\$\{[^}]+\}'
      - 'process\.env\.'
      - 'os\.(?:getenv|environ)'
    paths:
      - "**/*.md"
      - "**/*.rst"
      - "**/test_*"
      - "**/tests/**"
      - "**/*.example"
      - "**/*.sample"
      - "**/*.dist"

- id: generic-high-entropy-unquoted
  description: Unquoted high-entropy value next to credential-sounding name (.env / shell / yaml style)
  severity: low
  keywords: ["secret", "token", "password", "api_key", "apikey", "passwd", "_key"]
  regex: "(?i)(?:[A-Z0-9_]*(?:SECRET|TOKEN|PASSWORD|APIKEY|API_KEY|PASSWD|_KEY))\\s*[:=]\\s*([A-Za-z0-9/+=_\\-]{16,})"
  entropy_min: 3.8
  allowlist:
    regex:
      - 'xxxxxxxx'
      - '<[^>]*>'
      - '\{\{[^}]*\}\}'
      - 'changeme'
      - 'example'
      - 'placeholder'
