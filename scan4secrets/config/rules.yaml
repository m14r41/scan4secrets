  entropy_min: 3.5

- id: dockerhub-pat
  description: Docker Hub Personal Access Token
  severity: high
  keywords: ["dckr_pat_"]
  regex: '\b(dckr_pat_[A-Za-z0-9_\-]{27,})\b'

- id: npm-token
  description: NPM access token
  severity: high
  keywords: ["npm_"]
  regex: '\b(npm_[A-Za-z0-9]{36})\b'

- id: pypi-token
  description: PyPI upload token
  severity: high
  keywords: ["pypi-"]
  regex: '\b(pypi-AgEIcHlwaS5vcmc[A-Za-z0-9_\-]{50,})\b'

- id: terraform-cloud-token
  description: Terraform Cloud API token
  severity: high
  keywords: [".atlasv1."]
  regex: '\b([A-Za-z0-9]{14,16}\.atlasv1\.[A-Za-z0-9_\-]{60,})\b'

- id: vault-token
  description: HashiCorp Vault root/service token
  severity: critical
  keywords: ["hvs.", "s.", "b."]
  regex: '\b(hvs\.[A-Za-z0-9_\-]{90,})\b'

# =================== Auth ===================

- id: jwt-token
  description: JSON Web Token
  severity: medium
  keywords: ["eyJ"]
  regex: '\b(eyJ[A-Za-z0-9_\-]{10,}\.eyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,})\b'
  entropy_min: 4.0
  allowlist:
    paths: ["**/*.test.*", "**/test_*"]

- id: basic-auth-url
  description: HTTP Basic Auth credentials in URL
  severity: high
  keywords: ["://"]
  regex: '(?i)\b(?:https?|ftp)://([^/\s:@]+):([^/\s:@]+)@'

# =================== Crypto / Keys ===================

- id: private-key-block
  description: Private key (RSA / EC / OPENSSH / PGP / DSA / generic)
  severity: critical
  keywords: ["BEGIN ", "PRIVATE KEY"]
  regex: '(-----BEGIN ((?:RSA|EC|OPENSSH|PGP|DSA|ENCRYPTED) )?PRIVATE KEY-----)'

- id: ssh-pub-key-comment
  description: SSH authorized_keys with identifying comment
  severity: low
  keywords: ["ssh-rsa ", "ssh-ed25519 ", "ecdsa-sha2-"]
  regex: '\b((?:ssh-rsa|ssh-ed25519|ecdsa-sha2-[a-z0-9\-]+) AAAA[0-9A-Za-z+/=]{100,})'

- id: pgp-private-key
  description: PGP Private Key Block
  severity: critical
  keywords: ["BEGIN PGP PRIVATE"]
  regex: '(-----BEGIN PGP PRIVATE KEY BLOCK-----)'

# =================== Generic catch-all (last resort, high entropy) ===================

- id: contextual-hex-token
  description: Hex token (32 / 40 / 64 chars) next to a credential-sounding name
  severity: medium
  keywords: ["token", "secret", "key", "auth", "password", "api"]
  regex: "(?i)(?:token|secret|key|auth|password|api[_\\-]?key|sid)[A-Z0-9_]*\\s*[:=]\\s*[\"']?([a-f0-9]{32,64})\\b"
  allowlist:
    regex: ['00000000', 'deadbeef', 'aaaaaaaa', '12345678', '<[^>]*>']
    paths:
      - "**/*.md"
      - "**/test_*"
      - "**/tests/**"
      - "**/*.example"
      - "**/*.sample"

- id: contextual-uuid-secret
  description: UUID next to a credential-sounding name (npm tokens, etc.)
  severity: medium
  keywords: ["token", "secret", "key", "auth"]
  regex: "(?i)(?:token|secret|key|auth)[A-Z0-9_]*\\s*[:=]\\s*[\"']?([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\\b"
  allowlist:
    paths: ["**/*.md", "**/test_*", "**/tests/**", "**/*.example", "**/*.sample"]

