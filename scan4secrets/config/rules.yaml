# =================== Cloud / CDN / Edge ===================

- id: cloudflare-api-token
  description: Cloudflare API token (scoped, v4)
  severity: high
  keywords: ["cloudflare", "CF_API_TOKEN"]
  regex: "(?i)(?:cloudflare|cf[_\\-]?api[_\\-]?token)[^A-Za-z0-9]{1,15}([A-Za-z0-9_\\-]{40})"
  entropy_min: 4.0
  verify:
    method: GET
    url: https://api.cloudflare.com/client/v4/user/tokens/verify
    header_name: Authorization
    header_value: "Bearer {{value}}"
    success_status: 200
    success_body_contains: '"status":"active"'

- id: cloudflare-origin-ca-key
  description: Cloudflare Origin CA key
  severity: high
