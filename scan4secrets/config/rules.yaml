# scan4secrets v2 detection rules.
# Each rule is matched as: keyword pre-filter (fast) -> regex (precise) -> entropy gate -> allowlist.
# Schema:
#   id            unique slug
#   description   human-readable
#   severity      info | low | medium | high | critical
#   keywords      list of substrings that must appear in the line (case-insensitive). [] = run on every line.
#   regex         Python regex; the FIRST capturing group is treated as the secret value.
#   entropy_min   skip if Shannon entropy of value < this (default 0.0)
#   allowlist:
#     regex       skip if any of these patterns match the full line
#     paths       skip if file path matches any of these globs
#   verify        optional: live verification config (see VERIFICATION.md)

# =================== Cloud providers ===================

- id: aws-access-key-id
  description: AWS Access Key ID
  severity: high
  keywords: ["AKIA", "ASIA", "AGPA", "AROA", "AIPA"]
  regex: '\b((?:AKIA|ASIA|AGPA|AROA|AIPA)[0-9A-Z]{16})\b'
  entropy_min: 3.0
  allowlist:
    regex:
      - 'AKIAIOSFODNN7EXAMPLE'
      - 'AKIAI[0-9A-Z]{15}EXAMPLE'

- id: aws-secret-access-key
  description: AWS Secret Access Key (contextual)
  severity: critical
  keywords: ["aws_secret", "aws.secret", "secret_access_key", "SECRET_ACCESS_KEY"]
  regex: '(?i)aws[_\.\-]?(?:secret|access)[_\.\-]?key[\s:=]+["'']?([A-Za-z0-9/+=]{40})["'']?'
  entropy_min: 4.0

- id: aws-mws-token
  description: AWS MWS Auth Token
  severity: high
  keywords: ["amzn.mws."]
  regex: '\b(amzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\b'

- id: gcp-api-key
  description: Google API Key
  severity: high
  keywords: ["AIza"]
  regex: '\b(AIza[0-9A-Za-z\-_]{35})\b'
  entropy_min: 3.5

- id: gcp-oauth-client
  description: Google OAuth Client ID
  severity: medium
  keywords: [".apps.googleusercontent.com"]
  regex: '([0-9]+-[a-z0-9_]{32}\.apps\.googleusercontent\.com)'

- id: gcp-service-account-json
  description: GCP service-account JSON key (private key payload)
  severity: critical
  keywords: ["service_account", "private_key_id"]
  regex: '"type"\s*:\s*"service_account"[^}]*?"private_key_id"\s*:\s*"([0-9a-f]{40})"'

- id: azure-storage-account-key
  description: Azure Storage Account Key
  severity: critical
  keywords: ["AccountKey="]
  regex: 'AccountKey=([A-Za-z0-9+/=]{86,88})'
  entropy_min: 4.0

- id: azure-sas-token
  description: Azure Shared Access Signature
  severity: high
  keywords: ["sig=", "?sv="]
  regex: "\\?sv=[0-9\\-]+&[^\"'\\s]+&sig=([A-Za-z0-9%]{40,})"

- id: digitalocean-pat
  description: DigitalOcean Personal Access Token
  severity: critical
  keywords: ["dop_v1_"]
  regex: '\b(dop_v1_[a-f0-9]{64})\b'

- id: heroku-api-key
  description: Heroku API Key (UUID v4 near "heroku")
  severity: high
  keywords: ["heroku"]
  regex: '(?i)heroku[^A-Za-z0-9]{1,10}([0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12})'

# =================== Source control ===================

- id: github-pat-classic
  description: GitHub Personal Access Token (classic)
  severity: critical
  keywords: ["ghp_"]
  regex: '\b(ghp_[A-Za-z0-9]{36})\b'
  verify:
    method: GET
    url: https://api.github.com/user
    header_name: Authorization
    header_value: "token {{value}}"
    success_status: 200

- id: github-pat-fine-grained
  description: GitHub Personal Access Token (fine-grained)
  severity: critical
  keywords: ["github_pat_"]
  regex: '\b(github_pat_[A-Za-z0-9_]{82})\b'
  verify:
    method: GET
    url: https://api.github.com/user
    header_name: Authorization
    header_value: "token {{value}}"
    success_status: 200

- id: github-oauth
  description: GitHub OAuth Access Token
  severity: critical
  keywords: ["gho_"]
  regex: '\b(gho_[A-Za-z0-9]{36})\b'

- id: github-app-token
  description: GitHub App Token
  severity: high
  keywords: ["ghs_", "ghu_"]
  regex: '\b((?:ghs|ghu)_[A-Za-z0-9]{36})\b'

- id: github-refresh-token
  description: GitHub Refresh Token
  severity: high
  keywords: ["ghr_"]
  regex: '\b(ghr_[A-Za-z0-9]{36,})\b'

- id: gitlab-pat
  description: GitLab Personal Access Token
  severity: critical
  keywords: ["glpat-"]
  regex: '\b(glpat-[A-Za-z0-9_\-]{20})\b'

- id: bitbucket-app-password
  description: Bitbucket App Password (contextual)
  severity: high
  keywords: ["bitbucket"]
  regex: '(?i)bitbucket[^A-Za-z0-9]{1,12}([A-Za-z0-9]{32,})'
  entropy_min: 4.0

# =================== Payments ===================

