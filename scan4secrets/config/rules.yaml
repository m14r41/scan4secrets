  regex: '\b(access_token\$(?:production|sandbox)\$[a-z0-9_]{16}\$[a-f0-9]{32})\b'

# =================== Messaging ===================

- id: slack-bot-token
  description: Slack token (bot/user/legacy)
  severity: high
  keywords: ["xoxb-", "xoxp-", "xoxa-", "xoxr-", "xoxs-"]
  regex: '\b(xox[abprs]-[A-Za-z0-9-]{10,})\b'
  verify:
    method: POST
    url: https://slack.com/api/auth.test
    header_name: Authorization
    header_value: "Bearer {{value}}"
    success_status: 200
    failure_body_contains: '"ok":false'

- id: slack-webhook
  description: Slack Incoming Webhook
  severity: medium
  keywords: ["hooks.slack.com"]
  regex: '(https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+)'

- id: discord-bot-token
  description: Discord Bot Token
  severity: high
  keywords: ["MT", "Nz", "Bot "]
  regex: '\b([MN][A-Za-z\d]{23}\.[\w\-]{6}\.[\w\-]{27})\b'

- id: discord-webhook
  description: Discord Webhook URL
  severity: low
  keywords: ["discord.com/api/webhooks"]
  regex: '(https://discord(?:app)?\.com/api/webhooks/[0-9]+/[A-Za-z0-9_\-]+)'

- id: telegram-bot-token
  description: Telegram Bot Token
  severity: medium
  keywords: [":AAE", ":AAF", ":AAG", ":AAH"]
