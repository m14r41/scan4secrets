  keywords: ["pk_live_"]
  regex: '\b(pk_live_[A-Za-z0-9]{24,})\b'

- id: square-token
  description: Square Access Token
  severity: high
  keywords: ["EAAA", "sq0atp-", "sq0csp-"]
