  regex: '\b(sk_live_[A-Za-z0-9]{24,})\b'
  verify:
    method: GET
    url: https://api.stripe.com/v1/charges?limit=1
    header_name: Authorization
    header_value: "Bearer {{value}}"
    success_status: 200

- id: stripe-restricted-live
  description: Stripe Live Restricted Key
  severity: critical
  keywords: ["rk_live_"]
  regex: '\b(rk_live_[A-Za-z0-9]{24,})\b'

- id: stripe-publishable-live
